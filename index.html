<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lumeet | Dating + Messaging + Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* ========== ALL CSS STYLES ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Poppins', sans-serif; }
        body { min-height: 100vh; background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?q=80&w=2070&auto=format') center/cover no-repeat fixed; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.25); backdrop-filter: blur(4px); z-index: -1; }
        .glass-card { background: rgba(255, 255, 255, 0.18); backdrop-filter: blur(14px); border-radius: 32px; border: 1px solid rgba(255, 255, 255, 0.35); box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2); transition: transform 0.2s, box-shadow 0.2s; }
        .gradient-btn { background: linear-gradient(135deg, #c5e99b 0%, #56ab2f 100%); border: none; color: #1e2a1e; font-weight: 700; padding: 14px 20px; border-radius: 60px; width: 100%; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.2s; }
        .gradient-btn:hover { transform: scale(0.98); }
        .google-btn { background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.4); color: white; margin-top: 12px; }
        .google-btn:hover { background: rgba(255, 255, 255, 0.3); }
        .auth-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .auth-card { width: 100%; max-width: 440px; padding: 2rem 1.8rem; text-align: center; }
        .logo-icon { font-size: 3.2rem; color: #ffdf7e; }
        .logo-area h1 { font-size: 2.3rem; background: linear-gradient(135deg, #fff, #f9e45b); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .input-group { position: relative; margin: 1.2rem 0; }
        .input-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: rgba(255,255,240,0.9); }
        .input-group input, .input-group select { width: 100%; padding: 14px 20px 14px 48px; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4); border-radius: 60px; font-size: 1rem; color: white; }
        .toggle-pwd { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); cursor: pointer; color: white; }
        .switch-auth a { color: #ffec99; text-decoration: none; }
        .divider { display: flex; align-items: center; text-align: center; color: rgba(255,255,255,0.6); margin: 16px 0; }
        .divider::before, .divider::after { content: ''; flex: 1; border-bottom: 1px solid rgba(255,255,255,0.3); }
        .divider::before { margin-right: 12px; }
        .divider::after { margin-left: 12px; }
        .app-main { display: none; max-width: 550px; margin: 0 auto; padding: 20px 12px 80px; min-height: 100vh; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(20,20,30,0.85); backdrop-filter: blur(20px); border-top: 1px solid rgba(255,255,255,0.2); display: flex; justify-content: space-around; align-items: center; padding: 12px 20px 24px; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: #ccc; font-size: 0.7rem; cursor: pointer; transition: 0.2s; padding: 4px 12px; border-radius: 30px; }
        .nav-item i { font-size: 1.6rem; }
        .nav-item.active { color: #f5b042; text-shadow: 0 0 8px #ffb347; background: rgba(255,255,255,0.1); }
        .view { display: none; animation: fade 0.25s ease; }
        .active-view { display: block; }
        @keyframes fade { from { opacity: 0; transform: translateY(8px);} to { opacity: 1; transform: translateY(0);} }
        .cards-container { position: relative; width: 100%; height: 65vh; display: flex; justify-content: center; align-items: center; }
        .swipe-card { width: 90%; max-width: 340px; background: rgba(30,30,45,0.55); backdrop-filter: blur(16px); border-radius: 36px; padding: 20px; text-align: center; }
        .card-img { width: 100%; height: 240px; border-radius: 28px; object-fit: cover; }
        .action-buttons { display: flex; justify-content: center; gap: 40px; margin-top: 20px; }
        .action-circle { background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); padding: 15px; border-radius: 60px; cursor: pointer; }
        .like-btn { color: #4cff8e; }
        .pass-btn { color: #ff6b6b; }
        .explore-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; margin-top: 20px; }
        .explore-card { background: rgba(255,255,245,0.15); backdrop-filter: blur(8px); border-radius: 28px; padding: 12px; text-align: center; position: relative; }
        .report-btn { position: absolute; top: 8px; right: 8px; background: rgba(255,80,80,0.7); border: none; border-radius: 20px; padding: 4px 8px; color: white; font-size: 0.7rem; cursor: pointer; }
        .small-glass { background: rgba(255,255,200,0.25); border: none; border-radius: 60px; padding: 8px 16px; color: white; cursor: pointer; }
        .chat-list-container, .chat-screen-container { background: rgba(0,0,0,0.3); backdrop-filter: blur(12px); border-radius: 32px; overflow: hidden; margin-top: 12px; }
        .search-bar { padding: 12px; background: rgba(255,255,255,0.1); margin: 8px; border-radius: 40px; display: flex; align-items: center; gap: 8px; }
        .search-bar i { color: white; margin-left: 12px; }
        .search-bar input { background: transparent; border: none; color: white; flex: 1; outline: none; }
        .chat-list-item { display: flex; align-items: center; gap: 14px; padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.1s; }
        .chat-list-item:hover { background: rgba(255,255,255,0.1); }
        .avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; position: relative; }
        .online-dot { position: absolute; width: 14px; height: 14px; background: #22c55e; border-radius: 50%; border: 2px solid white; bottom: 2px; right: 2px; }
        .chat-info { flex: 1; }
        .chat-name { font-weight: 600; color: white; }
        .last-msg { font-size: 0.75rem; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
        .chat-meta { text-align: right; }
        .time { font-size: 0.7rem; color: #aaa; }
        .unread-badge { background: #22c55e; color: white; border-radius: 20px; padding: 2px 8px; font-size: 0.7rem; margin-top: 4px; display: inline-block; }
        .chat-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .back-btn { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        .chat-profile { display: flex; align-items: center; gap: 10px; }
        .chat-profile img { width: 44px; height: 44px; border-radius: 50%; }
        .chat-status { font-size: 0.7rem; color: #ccc; }
        .chat-actions i { font-size: 1.3rem; margin-left: 16px; color: white; cursor: pointer; }
        .messages-area { height: 55vh; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        .message-bubble { max-width: 80%; padding: 10px 14px; border-radius: 22px; animation: fadeInUp 0.2s ease; position: relative; }
        .received { background: rgba(255,255,255,0.2); backdrop-filter: blur(4px); align-self: flex-start; border-bottom-left-radius: 4px; color: white; }
        .sent { background: linear-gradient(135deg, #22c55e, #15803d); align-self: flex-end; border-bottom-right-radius: 4px; color: white; }
        .message-time { font-size: 0.65rem; opacity: 0.7; margin-top: 4px; display: flex; justify-content: flex-end; gap: 4px; align-items: center; }
        .message-status { font-size: 0.7rem; margin-left: 4px; }
        .status-sent { color: #ccc; }
        .status-delivered { color: #ccc; }
        .status-read { color: #4cff8e; }
        .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 8px 12px; background: rgba(255,255,255,0.1); border-radius: 20px; width: fit-content; margin: 8px 0; }
        .typing-dot { width: 6px; height: 6px; background: #ccc; border-radius: 50%; animation: pulse 1s infinite; }
        .input-area { display: flex; align-items: center; gap: 8px; padding: 12px; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.1); }
        .input-area input { flex: 1; background: rgba(255,255,255,0.2); border: none; border-radius: 30px; padding: 12px 18px; color: white; outline: none; }
        .input-area button { background: #22c55e; border: none; width: 44px; height: 44px; border-radius: 50%; color: white; cursor: pointer; }
        .reply-preview { background: rgba(0,0,0,0.5); padding: 6px 12px; border-radius: 16px; font-size: 0.8rem; margin-bottom: 8px; display: none; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%,100%{ opacity: 0.3; } 50%{ opacity: 1; } }
        .profile-top { text-align: center; margin-bottom: 24px; }
        .profile-pic-large { width: 110px; height: 110px; border-radius: 50%; object-fit: cover; border: 3px solid #ffd966; margin-bottom: 12px; position: relative; }
        .camera-overlay { position: absolute; bottom: 5px; right: calc(50% - 55px); background: #22c55e; border-radius: 50%; padding: 8px; cursor: pointer; border: 2px solid white; }
        .verified-badge { color: #3b82f6; margin-left: 6px; font-size: 1.2rem; vertical-align: middle; }
        .stats-row { display: flex; justify-content: space-around; background: rgba(0,0,0,0.3); border-radius: 28px; padding: 12px; margin: 16px 0; text-align: center; color: white; }
        .action-buttons-row { display: flex; gap: 12px; margin: 16px 0; }
        .action-buttons-row button { flex: 1; background: rgba(255,255,255,0.2); border: none; border-radius: 40px; padding: 10px; color: white; font-weight: 500; cursor: pointer; }
        .settings-list { background: rgba(0,0,0,0.3); border-radius: 32px; overflow: hidden; margin-top: 16px; }
        .settings-item { display: flex; align-items: center; justify-content: space-between; padding: 16px; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; color: white; }
        .settings-item-left { display: flex; align-items: center; gap: 14px; }
        .toggle-switch { width: 48px; height: 24px; background: rgba(255,255,255,0.3); border-radius: 30px; position: relative; transition: 0.2s; cursor: pointer; }
        .toggle-switch.active { background: #22c55e; }
        .toggle-knob { width: 20px; height: 20px; background: white; border-radius: 50%; position: absolute; top: 2px; left: 3px; transition: 0.2s; }
        .toggle-switch.active .toggle-knob { left: 25px; }
        .edit-profile-form input, .edit-profile-form textarea, .edit-profile-form select { width: 100%; background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); border-radius: 28px; padding: 12px; margin: 8px 0; color: white; outline: none; }
        .edit-profile-form input:focus { border-color: #22c55e; box-shadow: 0 0 8px #22c55e; }
        .interests-tag-input { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; }
        .tag { background: #22c55e; padding: 6px 12px; border-radius: 30px; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 6px; }
        .tag i { cursor: pointer; font-size: 0.7rem; }
        .premium-card { background: linear-gradient(135deg, rgba(255,215,0,0.2), rgba(255,215,0,0.05)); border: 1px solid gold; border-radius: 28px; padding: 16px; margin-top: 16px; text-align: center; }
        .back-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
        .back-header button { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        .progress-bar { background: rgba(255,255,255,0.2); border-radius: 20px; height: 6px; width: 100%; margin: 12px 0; }
        .progress-fill { background: #22c55e; width: 0%; height: 6px; border-radius: 20px; }
        .last-seen-preview { font-size: 0.7rem; color: #aaa; margin-top: 4px; }
        .slider-container { display: flex; align-items: center; gap: 12px; margin: 12px 0; }
        .dual-slider-container { display: flex; flex-direction: column; gap: 8px; padding: 12px; }
        .range-values { display: flex; justify-content: space-between; color: white; font-size: 0.8rem; }
        input[type="range"] { flex: 1; background: rgba(255,255,255,0.2); height: 4px; border-radius: 5px; -webkit-appearance: none; }
        input[type="range"]:focus { outline: none; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #22c55e; cursor: pointer; }
        .photo-grid { display: flex; gap: 8px; margin: 12px 0; overflow-x: auto; }
        .photo-grid img { width: 80px; height: 80px; border-radius: 20px; object-fit: cover; }
        .swipe-counter { text-align: center; color: white; font-size: 0.8rem; margin: 10px 0; padding: 8px; background: rgba(0,0,0,0.3); border-radius: 20px; }
        .blocked-badge { background: rgba(255,80,80,0.7); padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; margin-left: 8px; }
        .report-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border-radius: 28px; padding: 20px; z-index: 2000; width: 80%; max-width: 300px; text-align: center; }
        .report-modal button { margin: 8px; padding: 10px; border-radius: 40px; border: none; cursor: pointer; }
        .forgot-password { color: #ffec99; font-size: 0.8rem; cursor: pointer; margin-top: 8px; display: inline-block; }
    </style>
</head>
<body>
<div class="bg-overlay"></div>

<!-- LOGIN / SIGNUP -->
<div id="loginView" class="auth-container"><div class="glass-card auth-card"><div class="logo-area"><i class="fas fa-heart logo-icon"></i><h1>Lumeet</h1><p>where sparks glow</p></div><form id="loginFormElem"><div class="input-group"><i class="fas fa-envelope input-icon"></i><input type="email" id="loginEmail" placeholder="Email" required></div><div class="input-group"><i class="fas fa-lock input-icon"></i><input type="password" id="loginPassword" placeholder="Password"><i class="fas fa-eye-slash toggle-pwd" data-target="loginPassword"></i></div><button type="submit" class="gradient-btn">Log In</button><div class="forgot-password" id="forgotPasswordBtn">Forgot Password?</div><div class="divider">or</div><button type="button" id="googleSignInBtn" class="gradient-btn google-btn"><i class="fab fa-google"></i> Sign in with Google</button><p class="switch-auth">No account? <a href="#" id="goToSignupLink">Sign up</a></p></form></div></div>
<div id="signupView" class="auth-container" style="display:none;"><div class="glass-card auth-card"><h2 style="color:white;">Create account</h2><form id="signupFormElem"><div class="input-group"><i class="fas fa-user input-icon"></i><input type="text" id="signupName" placeholder="Full name"></div><div class="input-group"><i class="fas fa-envelope input-icon"></i><input type="email" id="signupEmail" placeholder="Email"></div><div class="input-group"><i class="fas fa-lock input-icon"></i><input type="password" id="signupPassword" placeholder="Password"></div><div class="input-group"><i class="fas fa-check-circle input-icon"></i><input type="password" id="confirmPwd" placeholder="Confirm password"></div><div class="input-group"><i class="fas fa-venus-mars input-icon"></i><select id="signupGender"><option>Female</option><option>Male</option></select></div><div class="input-group"><i class="fas fa-calendar input-icon"></i><input type="number" id="signupAge" placeholder="Age"></div><button type="submit" class="gradient-btn">Create account</button><div class="divider">or</div><button type="button" id="googleSignUpBtn" class="gradient-btn google-btn"><i class="fab fa-google"></i> Sign up with Google</button><p class="switch-auth">Already a member? <a href="#" id="goToLoginLink">Log in</a></p></form></div></div>

<!-- MAIN APP -->
<div id="mainApp" class="app-main">
    <div id="swipeView" class="view"><h2 style="color:white; text-align:center;">Swipe</h2><div id="swipeCounter" class="swipe-counter">Swipes remaining today: 10</div><div id="cardsStack" class="cards-container"></div><div class="action-buttons"><div class="action-circle pass-btn" id="passBtn"><i class="fas fa-times fa-2x"></i></div><div class="action-circle like-btn" id="likeBtn"><i class="fas fa-heart fa-2x"></i></div></div><div id="matchToast" style="position:fixed; bottom:30%; left:10%; right:10%; background:gold; border-radius:50px; text-align:center; padding:12px; display:none; z-index:200;">✨ It's a match! ✨</div></div>
    <div id="exploreView" class="view"><h2 style="color:white;">Discover</h2><div style="display:flex; gap:8px; flex-wrap:wrap;"><input type="number" id="filterAgeMin" placeholder="Min age" style="background:rgba(255,255,255,0.2); border-radius:40px; padding:8px; width:80px;"><input type="number" id="filterAgeMax" placeholder="Max age" style="background:rgba(255,255,255,0.2); border-radius:40px; padding:8px; width:80px;"><input type="number" id="filterDistance" placeholder="Distance (km)" style="background:rgba(255,255,255,0.2); border-radius:40px; padding:8px; width:100px;"><select id="filterGender" style="background:rgba(255,255,255,0.2); border-radius:40px;"><option value="">Any gender</option><option>Female</option><option>Male</option></select><button id="applyFilterBtn" class="small-glass">Filter</button></div><div id="matchQueue" style="background:rgba(0,0,0,0.3); border-radius:28px; padding:12px; margin-top:12px;"><h3 style="color:white; font-size:1rem;">Pending Likes</h3><div id="pendingLikesList"></div></div><div id="exploreList" class="explore-grid"></div></div>
    <div id="messagesView" class="view"><div id="chatListContainer" class="chat-list-container"></div><div id="chatScreenContainer" class="chat-screen-container" style="display:none;"></div></div>
    <div id="profileView" class="view"><div class="glass-card" style="padding:20px;"><div style="text-align:right;"><i class="fas fa-cog" id="openSettingsBtn" style="font-size:1.5rem; color:white; cursor:pointer;"></i></div><div class="profile-top"><div style="position:relative; display:inline-block;"><img id="profileAvatar" class="profile-pic-large" src=""><div class="camera-overlay" id="changePhotoBtn"><i class="fas fa-camera"></i></div><input type="file" id="photoUploadInput" style="display:none;" accept="image/*"></div><h2 style="color:white; margin-top:8px;"><span id="profileUsername"></span><i class="fas fa-check-circle verified-badge" style="display:none;"></i></h2><p id="profileStatus" style="color:#ccc;"></p><div class="last-seen-preview" id="lastSeenPreview"></div><div class="progress-bar"><div class="progress-fill" id="profileProgress"></div></div><div class="stats-row"><div><strong id="matchesCount">0</strong><br>Matches</div><div><strong id="likesCount">0</strong><br>Likes</div><div><strong id="viewsCount">0</strong><br>Views</div></div><div class="action-buttons-row"><button id="editProfileBtn"><i class="fas fa-edit"></i> Edit Profile</button><button id="shareProfileBtn"><i class="fas fa-share-alt"></i> Share</button><button id="boostProfileBtn"><i class="fas fa-rocket"></i> Boost</button></div></div><div class="settings-list" id="settingsListContainer"></div><button id="logoutBtnProfile" style="background:rgba(255,80,80,0.5); border:none; border-radius:60px; padding:12px; width:100%; margin-top:20px; color:white;">Logout</button></div></div>

    <!-- Subviews -->
    <div id="editProfileView" class="view" style="display:none;"><div class="glass-card" style="padding:20px;"><div class="back-header"><button id="backFromEdit"><i class="fas fa-arrow-left"></i></button><h2 style="color:white;">Edit Profile</h2></div><div class="edit-profile-form"><div class="photo-grid" id="photoGrid"></div><input type="text" id="editName" placeholder="Name"><textarea id="editBio" rows="2" placeholder="Bio"></textarea><select id="editGender"><option>Female</option><option>Male</option></select><input type="number" id="editAge" placeholder="Age"><input type="text" id="editLocation" placeholder="Location"><label style="color:white;">Interests (add tags):</label><div class="interests-tag-input" id="interestsContainer"></div><input type="text" id="newInterestInput" placeholder="Type interest and press Enter" style="margin-top:4px;"><button id="saveProfileChanges" class="gradient-btn" style="margin-top:16px;">Save Changes</button></div></div></div>
    <div id="settingsDetailView" class="view" style="display:none;"><div class="glass-card" style="padding:20px;"><div class="back-header"><button id="backFromSettings"><i class="fas fa-arrow-left"></i></button><h2 id="settingsTitle" style="color:white;">Settings</h2></div><div id="settingsDetailContent"></div></div></div>

    <!-- Bottom Navigation -->
    <div class="bottom-nav">
        <div class="nav-item" data-nav="swipe"><i class="fas fa-fire"></i><span>Swipe</span></div>
        <div class="nav-item" data-nav="explore"><i class="fas fa-compass"></i><span>Explore</span></div>
        <div class="nav-item" data-nav="messages"><i class="fas fa-comment-dots"></i><span>Chats</span></div>
        <div class="nav-item" data-nav="profile"><i class="fas fa-user"></i><span>Profile</span></div>
    </div>
</div>

<script type="module">
    // ========== FIREBASE IMPORTS ==========
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, sendPasswordResetEmail, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, getDocs, updateDoc, collection, addDoc, query, orderBy, onSnapshot, where, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyCWliI60g90f-Ed4ydFBPbz027fo7N29tI",
        authDomain: "ceezy-website.firebaseapp.com",
        projectId: "ceezy-website",
        storageBucket: "ceezy-website.appspot.com",
        messagingSenderId: "59858219268",
        appId: "1:59858219268:web:placeholder"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    const googleProvider = new GoogleAuthProvider();

    // ========== FIREBASE HELPER FUNCTIONS ==========
    window.signupUser = async (email, password, name, age, gender) => {
        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, password);
            await updateProfile(userCred.user, { displayName: name });
            await setDoc(doc(db, "users", userCred.user.uid), {
                uid: userCred.user.uid,
                name: name,
                email: email,
                age: parseInt(age),
                gender: gender,
                bio: "New here!",
                interests: [],
                profilePic: "",
                matches: [],
                swipes: [],
                swipesToday: 0,

    async function checkDailySwipes() {

            await window.updateUserFirebase(currentUser.uid, { swipesToday: 0, lastSwipeDate: Date.now() });

        }

    async function renderSwipeCards() {
        let available = await getAvailableProfiles();

            document.getElementById('cardsStack').innerHTML = `<div class="glass-card" style="padding:30px;text-align:center;">✨ No more profiles ✨</div>`; 
            return; 
        }
        let idx = 0;
        const container = document.getElementById('cardsStack');
        function display() {
            if(idx >= available.length) return;
            const p = available[idx];
            container.innerHTML = `<div class="swipe-card"><img class="card-img" src="${p.profilePic || 'https://randomuser.me/api/portraits/lego/1.jpg'}"><h3 style="color:white;">${p.name}, ${p.age}</h3><p>${p.bio}</p><button class="small-glass report-profile-btn" data-id="${p.uid}" style="margin-top:10px; background:rgba(255,80,80,0.5);">Report</button></div>`;

        }
        display();
        
        document.getElementById('likeBtn').onclick = async () => {
            if(idx >= available.length) return;
            const canSwipe = await checkDailySwipes();
            if (!canSwipe) { alert("Daily swipe limit reached! Upgrade to premium for unlimited swipes."); return; }
            const target = available[idx];
            const swipes = currentUser.swipes || [];
            swipes.push(target.uid);
            await window.updateUserFirebase(currentUser.uid, { swipes, swipesToday: (currentUser.swipesToday || 0) + 1 });
            currentUser.swipes = swipes;
            currentUser.swipesToday = (currentUser.swipesToday || 0) + 1;
            
            if (target.swipes && target.swipes.includes(currentUser.uid)) {
                const matches = currentUser.matches || [];
                if (!matches.includes(target.uid)) {
                    matches.push(target.uid);
                    await window.updateUserFirebase(currentUser.uid, { matches });
                    currentUser.matches = matches;
                    const targetMatches = target.matches || [];
                    if (!targetMatches.includes(currentUser.uid)) {
                        targetMatches.push(currentUser.uid);
                        await window.updateUserFirebase(target.uid, { matches: targetMatches });
                    }
                    document.getElementById('matchToast').style.display = 'block';
                    setTimeout(() => document.getElementById('matchToast').style.display = 'none', 3000);
                }
            }
            idx++;
            if(idx < available.length) display();
            else await renderSwipeCards();
            await renderProfileUI();
            renderChatList();
            await checkDailySwipes();
        };
        
        document.getElementById('passBtn').onclick = async () => {
            if(idx >= available.length) return;
            const canSwipe = await checkDailySwipes();
            if (!canSwipe) { alert("Daily swipe limit reached! Upgrade to premium for unlimited swipes."); return; }
            const swipes = currentUser.swipes || [];
            swipes.push(available[idx].uid);
            await window.updateUserFirebase(currentUser.uid, { swipes, swipesToday: (currentUser.swipesToday || 0) + 1 });
            currentUser.swipes = swipes;
            currentUser.swipesToday = (currentUser.swipesToday || 0) + 1;
            idx++;
            if(idx < available.length) display();
            else await renderSwipeCards();
            await checkDailySwipes();
        };
        await checkDailySwipes();
    }

    async function openChatScreen(partnerId) {
        currentChatPartner = partnerId;
        const users = await window.getUsersFirebase();
        const partner = users.find(u => u.uid === partnerId);
        document.getElementById('chatListContainer').style.display = 'none';
        const screenDiv = document.getElementById('chatScreenContainer');
        screenDiv.style.display = 'block';
        screenDiv.innerHTML = `
            <div class="chat-header"><button class="back-btn" id="backToChatList"><i class="fas fa-arrow-left"></i></button><div class="chat-profile"><img src="${partner.profilePic || 'https://randomuser.me/api/portraits/lego/1.jpg'}" id="chatAvatar"><div><div class="chat-name">${partner.name}</div><div class="chat-status" id="chatStatus">${partner.online ? 'Online' : 'Offline'}</div><div id="typingStatus" style="font-size:0.7rem; color:#ccc;"></div></div></div><div class="chat-actions"><i class="fas fa-phone" id="callDemo"></i><i class="fas fa-video" id="videoDemo"></i><i class="fas fa-ban" id="blockFromChat" style="color:#ff6b6b;"></i><i class="fas fa-ellipsis-v" id="menuUnmatch"></i></div></div>
            <div class="messages-area" id="messagesArea"></div>
            <div class="input-area"><input type="text" id="messageInputChat" placeholder="Type a message..."><button id="sendChatMsg"><i class="fas fa-paper-plane"></i></button></div>
        `;
        
        document.getElementById('backToChatList').addEventListener('click', () => { screenDiv.style.display = 'none'; document.getElementById('chatListContainer').style.display = 'block'; currentChatPartner = null; renderChatList(); });
        document.getElementById('blockFromChat')?.addEventListener('click', async () => {
            if(confirm(`Block ${partner.name}?`)) {
                await window.blockUser(currentUser.uid, partnerId);
                currentUser.blocked = currentUser.blocked || [];
                currentUser.blocked.push(partnerId);
                document.getElementById('backToChatList').click();
                alert("User blocked");
            }
        });
        document.getElementById('menuUnmatch')?.addEventListener('click', async () => { 
            if(confirm(`Unmatch ${partner.name}?`)){ 
                const matches = currentUser.matches.filter(id => id !== partnerId);
                await window.updateUserFirebase(currentUser.uid, { matches });
                currentUser.matches = matches;
                document.getElementById('backToChatList').click(); 
            } 
        });
        
        const typingRef = doc(db, "typing", `${currentUser.uid}_${partnerId}`);
        onSnapshot(typingRef, (doc) => {
            if (doc.exists() && doc.data().isTyping && doc.data().userId === partnerId) {
                document.getElementById('typingStatus').innerText = "typing...";
            } else {
                document.getElementById('typingStatus').innerText = "";
            }
        });
        
        const input = document.getElementById('messageInputChat');
        input.addEventListener('input', async () => {
            await setDoc(typingRef, { userId: currentUser.uid, isTyping: true, timestamp: Date.now() });
            if (typingTimeout) clearTimeout(typingTimeout);
            typingTimeout = setTimeout(async () => {
                await setDoc(typingRef, { userId: currentUser.uid, isTyping: false, timestamp: Date.now() });
            }, 1000);
        });
        
        const chatId = [currentUser.uid, partnerId].sort().join('_');
        const messagesArea = document.getElementById('messagesArea');
        const q = query(collection(db, "chats", chatId, "messages"), orderBy("timestamp"));
        onSnapshot(q, async (snapshot) => {
            const messages = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            messagesArea.innerHTML = messages.map(msg => {
                const isSent = msg.senderId === currentUser.uid;
                const time = new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                let statusHtml = '';
                if (isSent) {
                    if (msg.status === 'sent') statusHtml = '<span class="message-status status-sent">✓</span>';
                    else if (msg.status === 'delivered') statusHtml = '<span class="message-status status-delivered">✓✓</span>';
                    else if (msg.status === 'read') statusHtml = '<span class="message-status status-read">✓✓</span>';
                }
                return `<div class="message-bubble ${isSent ? 'sent' : 'received'}"><div class="message-text">${msg.text}</div><div class="message-time">${time} ${statusHtml}</div></div>`;
            }).join('');
            messagesArea.scrollTop = messagesArea.scrollHeight;
            
            const batch = writeBatch(db);
            messages.forEach(msg => {
                if (msg.senderId === partnerId && !msg.read) {
                    const msgRef = doc(db, "chats", chatId, "messages", msg.id);
                    batch.update(msgRef, { read: true, status: 'read' });
                }
            });
            await batch.commit();
        });
        
        document.getElementById('sendChatMsg').onclick = async () => {
            const text = input.value.trim();
            if(!text) return;
            await window.sendMessageFirebase(chatId, currentUser.uid, text);
            input.value = '';
            await setDoc(typingRef, { userId: currentUser.uid, isTyping: false, timestamp: Date.now() });
        };
    }

        ];
        document.getElementById('settingsListContainer').innerHTML = settingsList.map(s => `<div class="settings-item" data-key="${s.key}"><div class="settings-item-left"><i class="${s.icon}" style="width:24px"></i><span>${s.title}</span></div><i class="fas fa-chevron-right"></i></div>`).join('');
        document.querySelectorAll('.settings-item').forEach(el => el.addEventListener('click', () => showSettingsDetail(el.dataset.key)));
        
        document.getElementById('editProfileBtn').onclick = () => { document.getElementById('profileView').classList.remove('active-view'); document.getElementById('editProfileView').style.display = 'block'; loadEditProfile(); };
        document.getElementById('boostProfileBtn').onclick = () => alert("✨ Boost mode activated (premium UI)");
        document.getElementById('changePhotoBtn').onclick = () => document.getElementById('photoUploadInput').click();
        document.getElementById('photoUploadInput').onchange = async (e) => { 
            if(e.target.files[0]){ 
                const url = await window.uploadProfileImage(e.target.files[0], currentUser.uid);
                await window.updateUserFirebase(currentUser.uid, { profilePic: url });
                currentUser.profilePic = url;
                document.getElementById('profileAvatar').src = url;
                alert("Profile photo updated!");
            } 
        };
        document.getElementById('logoutBtnProfile').onclick = () => { localStorage.removeItem('currentUserUid'); window.location.reload(); };
    }
    
    function loadEditProfile() {
        document.getElementById('editName').value = currentUser.name;
        document.getElementById('editBio').value = currentUser.bio || "";
        document.getElementById('editGender').value = currentUser.gender;
        document.getElementById('editAge').value = currentUser.age;
        document.getElementById('editLocation').value = currentUser.location || "";
        const interests = currentUser.interests || [];
        const container = document.getElementById('interestsContainer');
        function renderTags() { container.innerHTML = interests.map((tag,i) => `<span class="tag">${tag} <i class="fas fa-times-circle remove-tag" data-index="${i}"></i></span>`).join(''); }
        renderTags();
        document.getElementById('newInterestInput').onkeypress = (e) => { if(e.key === 'Enter' && e.target.value.trim()){ interests.push(e.target.value.trim()); renderTags(); e.target.value = ''; } };
        document.getElementById('saveProfileChanges').onclick = async () => { 
            await window.updateUserFirebase(currentUser.uid, {
                name: document.getElementById('editName').value,
                bio: document.getElementById('editBio').value,
                gender: document.getElementById('editGender').value,
                age: parseInt(document.getElementById('editAge').value),
                location: document.getElementById('editLocation').value,
                interests: interests
            });
            currentUser = await window.getUserFirebase(currentUser.uid);
            alert("Profile updated"); 
            document.getElementById('backFromEdit').click(); 
        };
        document.getElementById('backFromEdit').onclick = () => { document.getElementById('editProfileView').style.display = 'none'; document.getElementById('profileView').classList.add('active-view'); renderProfileUI(); };
    }
    
    function showSettingsDetail(section) {
        document.getElementById('profileView').classList.remove('active-view');
        document.getElementById('settingsDetailView').style.display = 'block';
        document.getElementById('settingsTitle').innerText = section.charAt(0).toUpperCase() + section.slice(1);
        let content = '';
        if (section === 'account') content = `<div class="settings-item"><div>Change email/phone</div><i class="fas fa-chevron-right"></i></div><div class="settings-item"><div>Update password</div><i class="fas fa-chevron-right"></i></div><div class="settings-item"><div>Email Verification</div><i class="fas fa-envelope"></i></div>`;
        else if (section === 'privacy') content = `<div class="settings-item"><div>Last seen</div><div class="toggle-switch active"><div class="toggle-knob"></div></div></div><div class="settings-item"><div>Online status</div><div class="toggle-switch active"><div class="toggle-knob"></div></div></div><div class="settings-item"><div>Blocked users</div><i class="fas fa-chevron-right"></i></div>`;
        else if (section === 'dating') content = `<div class="settings-item"><div>Age preference</div><div class="dual-slider-container"><div class="range-values"><span>Min: <span id="minAgeVal">22</span></span><span>Max: <span id="maxAgeVal">35</span></span></div><input type="range" id="minAgeSlider" min="18" max="60" value="22"><input type="range" id="maxAgeSlider" min="18" max="60" value="35"></div></div><div class="settings-item"><div>Distance preference</div><input type="range" id="distancePrefSlider" min="5" max="100" value="50"><span id="distancePrefVal">50</span> km</div><button class="small-glass" id="savePrefsBtn">Save Preferences</button>`;
        else if (section === 'premium') content = `<div class="premium-card"><i class="fas fa-crown" style="font-size:2rem; color:gold;"></i><h3>Get Verified</h3><p>Blue check badge & priority</p><button class="small-glass" id="verifyBtn">Upgrade Now</button><hr><div style="text-align:left; padding:8px;"><strong>Free Plan:</strong><br>• 10 swipes/day<br>• Basic filters<br>• Standard support<br><br><strong style="color:#22c55e;">Plus ($3.27/month):</strong><br>✓ Unlimited swipes<br>✓ See who liked you<br>✓ Rewind last swipe<br>✓ 1 Boost/month<br>✓ No ads<br><br><strong>Premium ($12.99/month):</strong><br>✓ All Plus features<br>✓ Incognito mode<br>✓ Travel mode<br>✓ 5 Boosts/month<br>✓ Priority support</div><button class="gradient-btn" id="subscribePlusBtn" style="margin-top:12px;">Subscribe to Plus - $3.27/month</button></div>`;
        else content = `<div class="settings-item">FAQ</div><div class="settings-item">Contact support</div>`;
        document.getElementById('settingsDetailContent').innerHTML = content;
        if(document.getElementById('verifyBtn')) document.getElementById('verifyBtn').onclick = () => alert("Premium upgrade (UI demo)");
        if(document.getElementById('subscribePlusBtn')) document.getElementById('subscribePlusBtn').onclick = () => alert("✨ Plus subscription ($3.27/month) - Unlimited swipes, see who liked you, and more! ✨");
        if(document.getElementById('minAgeSlider')) {
            document.getElementById('minAgeSlider').oninput = () => { document.getElementById('minAgeVal').innerText = document.getElementById('minAgeSlider').value; };
            document.getElementById('maxAgeSlider').oninput = () => { document.getElementById('maxAgeVal').innerText = document.getElementById('maxAgeSlider').value; };
            document.getElementById('distancePrefSlider').oninput = () => { document.getElementById('distancePrefVal').innerText = document.getElementById('distancePrefSlider').value; };
        }
        document.getElementById('backFromSettings').onclick = () => { document.getElementById('settingsDetailView').style.display = 'none'; document.getElementById('profileView').classList.add('active-view'); renderProfileUI(); };
    }
    
    function attachNavEvents() {
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', async () => {
                const viewId = item.dataset.nav;
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active-view'));
                document.getElementById(viewId + 'View').classList.add('active-view');
                document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                item.classList.add('active');
                if(viewId === 'messages') { document.getElementById('chatListContainer').style.display = 'block'; document.getElementById('chatScreenContainer').style.display = 'none'; await renderChatList(); currentChatPartner = null; }
                if(viewId === 'explore') await renderExplore();
                if(viewId === 'profile') await renderProfileUI();
                if(viewId === 'swipe') await renderSwipeCards();
                document.getElementById('editProfileView').style.display = 'none';
                document.getElementById('settingsDetailView').style.display = 'none';
            });
        });
        document.querySelector('.nav-item[data-nav="swipe"]').classList.add('active');
    }
    
    async function renderAll() { 
        await renderProfileUI(); 
        await renderChatList(); 
        await renderExplore(); 
    }
    
    // Auto-check login state
    if(localStorage.getItem('currentUserUid')) { 
        await loadCurrentUser(); 
        if(currentUser) showMainApp(); 
        else document.getElementById('loginView').style.display = 'flex';
    } else { 
        document.getElementById('loginView').style.display = 'flex'; 
    }
    
    document.querySelectorAll('.toggle-pwd').forEach(icon=>{ icon.addEventListener('click',function(){ let target=document.getElementById(this.dataset.target); if(target.type==='password') target.type='text'; else target.type='password'; this.classList.toggle('fa-eye');}); });
    document.getElementById('applyFilterBtn')?.addEventListener('click',()=>renderExplore());
</script>
</body>
</html>
